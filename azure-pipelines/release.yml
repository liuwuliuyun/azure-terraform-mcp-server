#################################################################################
#                               OneBranch Pipelines                             #
# Documentation:  https://aka.ms/obpipelines                                    #
# Yaml Schema:    https://aka.ms/obpipelines/yaml/schema                        #
# Retail Tasks:   https://aka.ms/obpipelines/tasks                              #
#################################################################################

# Release pipeline — manually triggered, publishes to npm.
# Set NpmPublishDryRun to false to perform a real publish.

parameters:
    - name: NpmPublishTag
      displayName: 'Tag'
      type: string
      default: 'latest'
    - name: NpmPublishDryRun
      displayName: 'Dry Run'
      type: boolean
      default: true

trigger: none
pr: none

resources:
    repositories:
        - repository: templates
          type: git
          name: OneBranch.Pipelines/GovernedTemplates
          ref: refs/heads/main
    pipelines:
        # Consumes the artifact produced by the official build pipeline
        - pipeline: officialBuild
          project: internal
          source: terraform-mcp-server.official
          branch: main

extends:
    template: v2/OneBranch.Official.CrossPlat.yml@templates
    parameters:
        stages:
            - stage: Release
              jobs:
                  - job: Release
                    pool:
                        type: linux
                    variables:
                        # Required by OneBranch even for non-artifact jobs
                        ob_outputDirectory: '$(Build.SourcesDirectory)/out'
                    steps:
                        # Download .tgz from the official build
                        - download: officialBuild
                        - task: NodeTool@0
                          inputs:
                              versionSpec: '20.x'
                          displayName: 'Install Node.js 20.x'
                        - script: npm ci
                          displayName: 'npm ci'
                        # Rename to a stable filename for npm publish
                        - script: mv *.tgz package.tgz
                          displayName: 'Rename tgz file'
                          workingDirectory: '$(Pipeline.Workspace)/officialBuild/drop'
                        - task: Npm@1
                          displayName: 'npm publish'
                          inputs:
                              command: custom
                              workingDir: '$(Pipeline.Workspace)/officialBuild/drop'
                              verbose: true
                              customCommand: 'publish package.tgz --tag ${{ parameters.NpmPublishTag }} --dry-run ${{ lower(parameters.NpmPublishDryRun) }}'
                              customEndpoint: terraform-mcp-server-npm
