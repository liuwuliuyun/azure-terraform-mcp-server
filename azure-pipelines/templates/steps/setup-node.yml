# Reusable step: Install Node.js and run npm ci
parameters:
    - name: nodeVersion
      type: string
      default: '20.x'

steps:
    - task: NodeTool@0
      inputs:
          versionSpec: ${{ parameters.nodeVersion }}
      displayName: 'Install Node.js ${{ parameters.nodeVersion }}'
    - script: npm ci
      displayName: 'npm ci'
