# Stage template: Run unit tests on a given OS/pool
parameters:
    - name: name
      type: string
      default: 'UnitTests'
    - name: poolName
      type: string
      default: 'pool-windows-2022'
    - name: poolOs
      type: string
      default: 'windows'

stages:
    - stage: ${{ parameters.name }}
      dependsOn: []
      pool:
          name: ${{ parameters.poolName }}
          os: ${{ parameters.poolOs }}
      jobs:
          - job: UnitTests
            strategy:
                matrix:
                    Node20:
                        NODE_VERSION: '20.x'
                    Node22:
                        NODE_VERSION: '22.x'
            steps:
                - template: /azure-pipelines/templates/steps/setup-node.yml@self
                  parameters:
                      nodeVersion: $(NODE_VERSION)
                - script: npm run build
                  displayName: 'npm run build'
                - script: npm run lint
                  displayName: 'npm run lint'
                - script: npm run typecheck
                  displayName: 'npm run typecheck'
                - script: npm test
                  displayName: 'Run unit tests'
                - task: PublishTestResults@2
                  displayName: 'Publish Unit Test Results'
                  inputs:
                      testResultsFiles: 'test-results/*.xml'
                      testRunTitle: '$(Agent.JobName)'
                  condition: succeededOrFailed()
